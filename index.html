<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ontario G1 Practice Quiz</title>
    <style>
        :root {
            --primary-color: #0076a3;
            --primary-hover: #005c80;
            --success-color: #2e7d32;
            --error-color: #c62828;
            --background: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .quiz-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 25px;
        }

        /* Slider Styling */
        .slider-container {
            background: #f0f4f8;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: left;
        }

        .slider-label {
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .slider-label span #question-count-val {
            color: var(--primary-color);
            font-size: 20px;
            font-weight: 700;
        }

        .range-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            margin: 10px 0;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            transition: background 0.15s ease-in-out;
        }

        .range-slider::-webkit-slider-thumb:hover {
            background: var(--primary-hover);
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            max-width: 300px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .hide {
            display: none !important;
        }

        /* Quiz UI Elements */
        .question-text {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: left;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #fff;
            color: var(--text-main);
            border: 2px solid #e0e0e0;
            padding: 15px;
            font-size: 16px;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            background-color: #f0f7fa;
        }

        .option-btn.correct {
            background-color: #e8f5e9;
            border-color: var(--success-color);
            color: var(--success-color);
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: #ffebee;
            border-color: var(--error-color);
            color: var(--error-color);
        }

        .explanation-box {
            background-color: #eef7fc;
            border-left: 5px solid var(--primary-color);
            padding: 15px;
            text-align: left;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
            font-size: 15px;
            line-height: 1.5;
        }

        .explanation-box strong {
            color: var(--primary-color);
        }

        #next-btn {
            max-width: 100%;
            background-color: #333;
        }
        #next-btn:hover {
            background-color: #111;
        }

        .progress {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="title-screen" class="quiz-card">
        <h1>Ontario G1 Practice Quiz</h1>
        <p class="subtitle">Test your knowledge on rules of the road and traffic signs.</p>
        
        <div class="slider-container">
            <div class="slider-label">
                <span>Number of Questions:</span>
                <span><span id="question-count-val">5</span></span>
            </div>
            <input type="range" id="question-slider" class="range-slider" min="1" max="5" value="5">
        </div>

        <button class="btn" id="start-btn">Start Quiz</button>
    </div>

    <div id="quiz-screen" class="quiz-card hide">
        <div class="progress">Question <span id="current-number">1</span> of <span id="total-number">5</span></div>
        <div class="question-text" id="question-text">Question template placeholder</div>
        
        <div class="options-container" id="options-container"></div>

        <div id="explanation-container" class="explanation-box hide">
            <strong>Explanation:</strong> <span id="explanation-text"></span>
        </div>

        <button class="btn hide" id="next-btn">Next Question</button>
    </div>

    <div id="results-screen" class="quiz-card hide">
        <h1>Quiz Completed!</h1>
        <p class="subtitle" id="score-text">You scored 0 out of 0.</p>
        <button class="btn" id="restart-btn">Try Again</button>
    </div>

<script src="questions.js"></script>
<script src="logic.js"></script>

</body>
</html>
