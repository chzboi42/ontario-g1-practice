<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ontario G1 Practice Quiz</title>
    <style>
        :root {
            --primary-color: #0076a3;
            --primary-hover: #005c80;
            --success-color: #2e7d32;
            --error-color: #c62828;
            --background: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .quiz-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 25px;
        }

        /* Slider Styling */
        .slider-container {
            background: #f0f4f8;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: left;
        }

        .slider-label {
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .slider-label span #question-count-val {
            color: var(--primary-color);
            font-size: 20px;
            font-weight: 700;
        }

        .range-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            margin: 10px 0;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            transition: background 0.15s ease-in-out;
        }

        .range-slider::-webkit-slider-thumb:hover {
            background: var(--primary-hover);
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            max-width: 300px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .hide {
            display: none !important;
        }

        /* Quiz UI Elements */
        .question-text {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: left;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #fff;
            color: var(--text-main);
            border: 2px solid #e0e0e0;
            padding: 15px;
            font-size: 16px;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            background-color: #f0f7fa;
        }

        .option-btn.correct {
            background-color: #e8f5e9;
            border-color: var(--success-color);
            color: var(--success-color);
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: #ffebee;
            border-color: var(--error-color);
            color: var(--error-color);
        }

        .explanation-box {
            background-color: #eef7fc;
            border-left: 5px solid var(--primary-color);
            padding: 15px;
            text-align: left;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
            font-size: 15px;
            line-height: 1.5;
        }

        .explanation-box strong {
            color: var(--primary-color);
        }

        #next-btn {
            max-width: 100%;
            background-color: #333;
        }
        #next-btn:hover {
            background-color: #111;
        }

        .progress {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="title-screen" class="quiz-card">
        <h1>Ontario G1 Practice Quiz</h1>
        <p class="subtitle">Test your knowledge on rules of the road and traffic signs.</p>
        
        <div class="slider-container">
            <div class="slider-label">
                <span>Number of Questions:</span>
                <span><span id="question-count-val">5</span></span>
            </div>
            <input type="range" id="question-slider" class="range-slider" min="1" max="5" value="5">
        </div>

        <button class="btn" id="start-btn">Start Quiz</button>
    </div>

    <div id="quiz-screen" class="quiz-card hide">
        <div class="progress">Question <span id="current-number">1</span> of <span id="total-number">5</span></div>
        <div class="question-text" id="question-text">Question template placeholder</div>
        
        <div class="options-container" id="options-container"></div>

        <div id="explanation-container" class="explanation-box hide">
            <strong>Explanation:</strong> <span id="explanation-text"></span>
        </div>

        <button class="btn hide" id="next-btn">Next Question</button>
    </div>

    <div id="results-screen" class="quiz-card hide">
        <h1>Quiz Completed!</h1>
        <p class="subtitle" id="score-text">You scored 0 out of 0.</p>
        <button class="btn" id="restart-btn">Try Again</button>
    </div>

<script src="questions.js"></script>
<script>
    let activeQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;

    // DOM Elements
    const titleScreen = document.getElementById('title-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultsScreen = document.getElementById('results-screen');
    
    const startBtn = document.getElementById('start-btn');
    const nextBtn = document.getElementById('next-btn');
    const restartBtn = document.getElementById('restart-btn');
    
    const questionSlider = document.getElementById('question-slider');
    const questionCountVal = document.getElementById('question-count-val');
    
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const explanationContainer = document.getElementById('explanation-container');
    const explanationText = document.getElementById('explanation-text');
    
    const currentNumberElem = document.getElementById('current-number');
    const totalNumberElem = document.getElementById('total-number');
    const scoreText = document.getElementById('score-text');

    // Setup Slider Limits dynamically based on database size
    questionSlider.max = g1QuestionsDatabase.length;
    questionSlider.value = g1QuestionsDatabase.length;
    questionCountVal.innerText = questionSlider.value;

    // Update slider UI text when dragged
    questionSlider.addEventListener('input', (e) => {
        questionCountVal.innerText = e.target.value;
    });

    // Event Listeners
    startBtn.addEventListener('click', startQuiz);
    nextBtn.addEventListener('click', handleNextButton);
    restartBtn.addEventListener('click', () => {
        resultsScreen.classList.add('hide');
        titleScreen.classList.remove('hide');
    });

    function startQuiz() {
        titleScreen.classList.add('hide');
        quizScreen.classList.remove('hide');
        
        currentQuestionIndex = 0;
        score = 0;

        // 1. Randomize/Shuffle the master question list
        const shuffledMaster = [...g1QuestionsDatabase].sort(() => Math.random() - 0.5);
        
        // 2. Slice the array to match what the user selected on the slider
        const totalRequested = parseInt(questionSlider.value);
        activeQuestions = shuffledMaster.slice(0, totalRequested);

        totalNumberElem.innerText = activeQuestions.length;
        
        showQuestion();
    }

    function showQuestion() {
        resetState();
        
        let currentQuestion = activeQuestions[currentQuestionIndex];
        currentNumberElem.innerText = currentQuestionIndex + 1;
        questionText.innerText = currentQuestion.question;

        // Shuffle options so the correct answer isn't always in the same slot
        const shuffledOptions = [...currentQuestion.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(option => {
            const button = document.createElement('button');
            button.innerText = option;
            button.classList.add('option-btn');
            button.addEventListener('click', () => selectOption(button, option, currentQuestion.correct, currentQuestion.explanation));
            optionsContainer.appendChild(button);
        });
    }

    function resetState() {
        nextBtn.classList.add('hide');
        explanationContainer.classList.add('hide');
        optionsContainer.innerHTML = '';
    }

    function selectOption(selectedBtn, chosenOption, correctOption, explanation) {
        const allButtons = optionsContainer.querySelectorAll('.option-btn');
        allButtons.forEach(btn => btn.disabled = true);

        if (chosenOption === correctOption) {
            selectedBtn.classList.add('correct');
            score++;
        } else {
            selectedBtn.classList.add('wrong');
            allButtons.forEach(btn => {
                if (btn.innerText === correctOption) {
                    btn.classList.add('correct');
                }
            });
        }

        explanationText.innerText = explanation;
        explanationContainer.classList.remove('hide');
        nextBtn.classList.remove('hide');
    }

    function handleNextButton() {
        currentQuestionIndex++;
        if (currentQuestionIndex < activeQuestions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizScreen.classList.add('hide');
        resultsScreen.classList.remove('hide');
        scoreText.innerText = `You scored ${score} out of ${activeQuestions.length}!\n` +
                                (score / activeQuestions.length >= 0.8 ? `You passed!`
                                                                    : `You failed. Please try again.`);
    }
</script>

</body>
</html>
